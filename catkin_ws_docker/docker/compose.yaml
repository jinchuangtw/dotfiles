services:
  gvins-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}
        USERNAME: developer

    image: gvins-noetic-dev:latest
    container_name: gvins-noetic-dev

    network_mode: host
    ipc: host
    pid: host

    stdin_open: true
    tty: true

    environment:
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
      ROS_MASTER_URI: http://localhost:11311
      ROS_HOSTNAME: localhost

    volumes:
      - ~/Development/catkin_ws_docker:/home/developer/catkin_ws
      - ~/Development/datasets:/home/developer/datasets:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/home/developer/.Xauthority:ro
      - /dev:/dev

    privileged: true

    working_dir: /home/developer/catkin_ws

    command: bash
